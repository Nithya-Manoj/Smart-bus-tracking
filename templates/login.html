<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Portal – Sign In</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">🚌</div>
      <h1>Parent Portal</h1>
      <p>Real-Time Bus Tracking System</p>
    </div>

    <div id="errBox" class="alert-error" style="display:none">
      <i class="fa fa-triangle-exclamation"></i><span id="errMsg"></span>
    </div>

    <div class="fld">
      <label for="email">Email Address</label>
      <div class="fld-in">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <div class="fld">
      <label for="password">Password</label>
      <div class="fld-in">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button type="button" id="loginBtn" class="login-btn" onclick="doLogin()">
      <i class="fa fa-right-to-bracket"></i> Sign In
    </button>

    <div style="text-align:center;margin-top:15px">
      <a href="/student-login" style="color:var(--primary,#3b82f6);text-decoration:none;font-size:0.9rem;font-weight:500">
        Are you a student? <span style="text-decoration:underline">Log in here</span> <i class="fa fa-arrow-right" style="font-size:0.8rem"></i>
      </a>
    </div>
    <div class="login-foot">🔒 Secured by Firebase Authentication</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const app  = initializeApp({
    apiKey: "AIzaSyBxWLk4onnZ6GUv-xQZZ7XQqVq045Qwl9I",
    authDomain: "bus-management-660f7.firebaseapp.com",
    projectId:  "bus-management-660f7",
    appId:      "1:1084362165063:web:c0ee7b0c39f2e590985a62"
  });
  const auth = getAuth(app);

  function showErr(msg) {
    document.getElementById('errMsg').textContent = msg;
    document.getElementById('errBox').style.display = 'flex';
  }

  window.doLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const btn   = document.getElementById('loginBtn');

    document.getElementById('errBox').style.display = 'none';
    if (!email || !pass) { showErr('Email and password are required.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Signing in…';

    try {
      const cred  = await signInWithEmailAndPassword(auth, email, pass);
      const token = await cred.user.getIdToken(true);

      // Store in localStorage — dashboard reads this
      localStorage.setItem('parent_token', token);
      localStorage.setItem('parent_uid', cred.user.uid);

      console.log('[LOGIN] Token stored. Redirecting to dashboard…');
      window.location.href = '/dashboard';
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa fa-right-to-bracket"></i> Sign In';
      let msg = err.message || 'Login failed.';
      if (msg.includes('user-not-found') || msg.includes('wrong-password') || msg.includes('invalid-credential'))
        msg = 'Invalid email or password.';
      else if (msg.includes('too-many-requests'))
        msg = 'Too many attempts. Please try again later.';
      showErr(msg);
    }
  };

  document.addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
</script>
</body>
</html>
